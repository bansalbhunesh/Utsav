name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: utsav
          POSTGRES_PASSWORD: utsav
          POSTGRES_DB: utsav
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U utsav -d utsav"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Go test & build
        env:
          DATABASE_URL: postgres://utsav:utsav@127.0.0.1:5432/utsav?sslmode=disable
          MIGRATIONS_PATH: ../../db/migrations
          RUN_MIGRATIONS: "true"
          JWT_SECRET: ci-secret
        run: |
          go mod tidy
          go test ./...
          go build -o /tmp/utsav-api ./cmd/server

  api-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Integration migration test (testcontainers)
        run: |
          go test -tags=integration ./internal/httpserver -run TestMigrationsAgainstPostgresContainer -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API deps
        working-directory: services/api
        run: go mod tidy

      - name: Install web deps
        working-directory: .
        run: |
          npm install

      - name: Start API
        env:
          DATABASE_URL: postgres://utsav:utsav@127.0.0.1:5432/utsav?sslmode=disable
          MIGRATIONS_PATH: ../../db/migrations
          RUN_MIGRATIONS: "true"
          JWT_SECRET: ci-secret
          HTTP_PORT: "8080"
          CORS_ORIGIN: http://127.0.0.1:3000
        run: |
          docker run -d --name utsav-ci-pg -e POSTGRES_USER=utsav -e POSTGRES_PASSWORD=utsav -e POSTGRES_DB=utsav -p 5432:5432 postgres:16-alpine
          for i in {1..30}; do docker exec utsav-ci-pg pg_isready -U utsav -d utsav && break; sleep 2; done
          cd services/api
          go run ./cmd/server > /tmp/utsav-api.log 2>&1 &
          echo $! > /tmp/utsav-api.pid
          for i in {1..60}; do curl -fsS http://127.0.0.1:8080/v1/healthz && break; sleep 2; done

      - name: Start web
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
        run: |
          npm run dev > /tmp/utsav-web.log 2>&1 &
          echo $! > /tmp/utsav-web.pid
          for i in {1..60}; do curl -fsS http://127.0.0.1:3000 && break; sleep 2; done

      - name: Run e2e smoke
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_PHONE: +919876543210
          E2E_OTP: "123456"
        working-directory: .
        run: npm run test:e2e

      - name: Cleanup
        if: always()
        run: |
          test -f /tmp/utsav-web.pid && kill $(cat /tmp/utsav-web.pid) || true
          test -f /tmp/utsav-api.pid && kill $(cat /tmp/utsav-api.pid) || true
          docker rm -f utsav-ci-pg || true
