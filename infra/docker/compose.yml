services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: utsav
      POSTGRES_PASSWORD: utsav
      POSTGRES_DB: utsav
    ports:
      - "5432:5432"
    volumes:
      - utsav_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utsav -d utsav"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  utsav_pgdata:
